services:
  db:
    build: ./db
    container_name: tienda-db-compose
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
    ports:
      - "3307:3306"
    volumes:
      - dbdata_compose:/var/lib/mysql
    networks:
      - tienda-net

  backend:
    build: ./backend
    container_name: tienda-backend-compose
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_perritos
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - tienda-net

  frontend:
    build: ./frontend
    container_name: tienda-frontend-compose
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/default.compose.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - tienda-net

volumes:
  dbdata_compose:

networks:
  tienda-net:
    driver: bridge
