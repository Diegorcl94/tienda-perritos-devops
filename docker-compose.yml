services:
  db:
    build: ./db
    container_name: tienda-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - tienda-net

  backend:
    build: ./backend
    container_name: tienda-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_perritos
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - tienda-net

  frontend:
    build: ./frontend
    container_name: tienda-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tienda-net

volumes:
  dbdata:

networks:
  tienda-net:
    driver: bridge